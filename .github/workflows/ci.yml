name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Smoke eval (offline, mock provider)
        run: llm-eval evals/smoke.yaml -p mock
