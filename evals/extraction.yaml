name: extraction
description: >
  Extract structured fields from free-text job ads into JSON.
  Ties into the JobScout use case: turning messy postings into clean records.

  Note on design: an earlier version used a boolean `remote` field, but every
  model classified "hybrid" as remote=true — a boolean can't represent hybrid.
  The schema now uses a `work_mode` enum, which is both a fairer test and a more
  realistic extraction target. This is a good example of an eval surfacing a
  rubric bug, not just a model weakness.
grader: json_fields
system: >
  You extract structured data from job ads. Respond with ONLY a JSON object,
  no prose, no markdown fences. Keys: seniority (one of: junior, mid, senior)
  and work_mode (one of: remote, hybrid, onsite).

cases:
  - id: senior-remote
    prompt: >
      Ad: "We're hiring a Senior Backend Engineer (Python). Fully remote,
      work from anywhere in Europe."
    expected:
      seniority: senior
      work_mode: remote

  - id: junior-onsite
    prompt: >
      Ad: "Junior Data Analyst wanted for our Belgrade office. On-site,
      Mon-Fri."
    expected:
      seniority: junior
      work_mode: onsite

  - id: mid-hybrid
    prompt: >
      Ad: "Looking for a mid-level Frontend Developer. Hybrid: 2 days in
      office, 3 remote."
    expected:
      seniority: mid
      work_mode: hybrid
